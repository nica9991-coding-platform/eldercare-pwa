# AWS Amplify Hosting build spec (fullstack).
# Used when you connect this GitHub repo in the Amplify console — Amplify runs
# this on every push: it deploys the backend in amplify/ (Cognito, AppSync,
# DynamoDB, Lambdas), writes amplify_outputs.json, then builds the Vite PWA.
# Not used for local dev or `npx ampx sandbox`.
version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        # $AWS_BRANCH / $AWS_APP_ID are provided by Amplify Hosting
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
